<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Contact Book App</title>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>Contact Book</h1>
                <p>Manage your contacts with our simple API-powered app.</p>
            </div>
            <div class="content">
                <div id="setupPage" class="page active">
                    <div class="api-setup">
                        <h3>API Setup Required</h3>
                        <p>Before you use the contact book, please enter your api key below. If you don't have one you can use: 
                            <strong>appacademy@itvarsity.org</strong>
                        </p>
                    </div>
                    <div class="form-group">
                        <label for="apiKeyInput">Enter your API Key (Email address)</label>
                        <input type="email" id="apiKey" placeholder="your-email@example.com">
                    </div>
                    <button class="btn" onclick="setupApiKey()">Start using contact book</button>
                </div>
                <div id="contactsPage" class="page">
                    <div style="display: flex; justify-content: space-between; 
                    align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px">
                        <h2>Your Contacts</h2>
                        <div>
                            <button class="btn btn-secondary" onclick="refreshContacts()">Refresh</button>
                            <button class="btn btn-success" onclick="showAddContact()">+ Add Contact</button>
                        </div>
                    </div>
                    <div id="contactsList">
                        <div class="loading">Loading contacts...</div>
                    </div>
                </div>
                <!-- Add Contact Page -->
                <div id="addContactsPage" class="page">
                    <button class="btn btn-secondary back-btn" onclick="showContacts()">Back to Contacts</button>
                    <h2>Add New Contact</h2>
                    <form id="editForm" id="addContactForm" onsubmit="addContact(event)">
                        <div class="form-group">
                            <label for="firstname">First name:</label>
                            <input type="text" name="firstname" id="firstname" required><br/>
                        </div>
                        <div class="form-group">
                            <label for="lastname">Last name:</label>
                            <input type="text" name="lastname" id="lastname" required>
                        </div>
                        <div class="form-group">
                            <label for="mobile">Mobile:</label>
                            <input type="tel" name="mobile" id="mobile" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email:</label>
                            <input type="email" name="email" id="email" required>
                        </div>
                        <div class="form-group">
                            <label for="avatar">Profile Picture:</label>
                            <input type="file" name="avatar" id="avatar" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-success" id="submitForm">Save Contact</button>
                        <button type="button" class="btn btn-secondary" onclick="showContacts()">Cancel</button>
                        
                        
                    </form>
                </div>
                <!-- Edit Contact Page -->
                <div id="editContactsPage" class="page">
                    <button class="btn btn-secondary back-btn" onclick="showContacts()">Back to Contacts</button>
                    <h2>Edit Contact</h2>
                    <form id="editForm" id="editContactForm" onsubmit="updateContact(event)">
                        <input type="hidden" id="editContactId">

                        <div class="form-group">
                            <label for="editFirstname">First name:</label>
                            <input type="text" name="firstname" id="editFirstname" required><br/>
                        </div>
                        <div class="form-group">
                            <label for="editLastname">Last name:</label>
                            <input type="text" name="lastname" id="editLastname" required>
                        </div>
                        <div class="form-group">
                            <label for="editMobile">Mobile:</label>
                            <input type="tel" name="mobile" id="editMobile" required>
                        </div>
                        <div class="form-group">
                            <label for="editEmail">Email:</label>
                            <input type="email" name="email" id="editEmail" required>
                        </div>
                        <div class="form-group">
                            <label for="editAvatar">Profile Picture:</label>
                            <input type="file" name="avatar" id="editAvatar" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-success">Update Contact</button>
                        <button type="button" class="btn btn-secondary" onclick="showContacts()">Cancel</button>
                        
                        
                    </form>
                </div>
            </div>
        </div>
        
        <script src="config.js"></script>
        <script src="main.js"></script>
        <script src="script.js"></script>

    </body>
</html>
